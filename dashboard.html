<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 ClawRecall Dashboard v2.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
    }

    .highlight {
      background-color: #4ade80;
      color: #000;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .fact {
      transition: all 0.2s ease;
    }

    .fact:hover {
      transform: translateX(6px);
      background-color: #27272a;
    }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-200 min-h-screen p-6">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3">
        🦞 ClawRecall <span class="text-teal-400">Dashboard v2.1</span>
      </h1>
      <div class="text-sm text-zinc-500">Auto-load + Smart Search • Made in Madurai</div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
      <!-- Drag & Drop Zone -->
      <div id="dropZone"
        class="mb-8 border-2 border-dashed border-zinc-800 rounded-3xl p-10 text-center transition-all hover:border-teal-500/50 hover:bg-teal-500/5 cursor-pointer group">
        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">📥</div>
        <div class="text-zinc-400 font-medium">Drag & Drop your <span class="text-teal-400">MEMORY.md</span> here</div>
        <div class="text-xs text-zinc-600 mt-2">Or click the buttons below to try auto-load</div>
      </div>

      <!-- Auto Load -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <button onclick="autoLoadFile('MEMORY.md')"
          class="bg-teal-600/10 hover:bg-teal-600/20 text-teal-400 border border-teal-500/30 p-6 rounded-2xl font-medium text-lg transition flex flex-col items-center justify-center gap-1 group">
          <span class="flex items-center gap-2 group-hover:scale-105 transition-transform">📂 Auto-Load MEMORY.md</span>
          <span class="text-[10px] opacity-50 font-normal">Works better via http://</span>
        </button>
        <button onclick="autoLoadFile('working-context.md')"
          class="bg-orange-600/10 hover:bg-orange-600/20 text-orange-400 border border-orange-500/30 p-6 rounded-2xl font-medium text-lg transition flex flex-col items-center justify-center gap-1 group">
          <span class="flex items-center gap-2 group-hover:scale-105 transition-transform">📂 Auto-Load
            working-context.md</span>
          <span class="text-[10px] opacity-50 font-normal">Works better via http://</span>
        </button>
      </div>

      <!-- Search -->
      <div class="flex gap-3 mb-6">
        <input id="searchInput" type="text" placeholder="Search memories... (try 'cardamom')" onkeyup="filterResults()"
          class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-teal-500">
        <button onclick="clearSearch()"
          class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">Clear</button>
      </div>

      <div id="status"
        class="text-sm border-l-2 border-teal-500/30 pl-4 py-2 bg-zinc-800/50 rounded-r-lg mb-6 min-h-[44px] flex items-center">
      </div>
      <div id="results" class="space-y-6"></div>
    </div>

    <div class="text-center mt-8 text-xs text-zinc-500">
      Your files live at: <code class="bg-zinc-800 px-2 py-1 rounded">%USERPROFILE%\.openclaw\workspace\</code><br>
      Future updates will auto-open this improved dashboard.
    </div>
  </div>

  <script>
    let currentContent = '';
    let currentFilename = '';

    async function autoLoadFile(filename) {
      const status = document.getElementById('status');
      const isFileProtocol = window.location.protocol === 'file:';

      status.innerHTML = `<span class="animate-pulse">🔄 Trying to auto-load <strong>${filename}</strong>...</span>`;

      try {
        const res = await fetch(`../../workspace/${filename}`);
        if (!res.ok) throw new Error('File not found');

        const text = await res.text();
        currentContent = text;
        currentFilename = filename;

        status.innerHTML = `✅ <strong class="text-teal-400">Auto-loaded ${filename}</strong> successfully!`;
        renderContent(text);
      } catch (err) {
        console.error('Auto-load failed:', err);
        status.innerHTML = `⚠️ <span class="text-orange-400 font-bold">Auto-load blocked.</span> ${isFileProtocol ? 'Browser security (CORS) blocks file:// access.' : 'File not found.'} Opening manual picker...`;

        // Short delay for user to read the message
        setTimeout(() => manualLoadFile(), 1500);
      }
    }

    function manualLoadFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.md';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        handleFile(file);
      };
      input.click();
    }

    async function handleFile(file) {
      const text = await file.text();
      currentContent = text;
      currentFilename = file.name;
      document.getElementById('status').innerHTML = `✅ Loaded <strong>${file.name}</strong> from your device.`;
      renderContent(text);
    }

    // Drag & Drop Handling
    const dropZone = document.getElementById('dropZone');

    dropZone.onclick = () => manualLoadFile();

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('border-teal-500', 'bg-teal-500/10');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('border-teal-500', 'bg-teal-500/10');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-teal-500', 'bg-teal-500/10');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.md')) {
        handleFile(file);
      } else {
        document.getElementById('status').innerHTML = '❌ <span class="text-red-400">Invalid file.</span> Please drop a .md file.';
      }
    });

    function renderContent(md) {
      const lines = md.split('\n');
      let html = '';
      lines.forEach(line => {
        if (line.startsWith('## ')) {
          html += `<div class="text-teal-400 font-semibold text-lg mt-8 mb-3">${line}</div>`;
        } else if (line.startsWith('- ')) {
          html += `<div class="fact bg-zinc-800 border-l-4 border-teal-500 pl-5 py-3 rounded-r-xl">${line}</div>`;
        } else if (line.trim()) {
          html += `<div class="text-zinc-400 text-sm pl-5">${line}</div>`;
        }
      });
      document.getElementById('results').innerHTML = html || '<p class="text-zinc-500 italic">No entries yet.</p>';
    }

    function filterResults() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!currentContent) return;

      if (!term) {
        renderContent(currentContent);
        return;
      }

      const lines = currentContent.split('\n');
      let html = '';
      let currentSectionHeader = '';
      let sectionMatches = false;
      let sectionBuffer = [];

      // Helper to highlight matches
      const highlight = (text) => {
        const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(`(${escapedTerm})`, 'gi'), '<span class="highlight">$1</span>');
      };

      lines.forEach(line => {
        const lower = line.toLowerCase();

        if (line.startsWith('## ')) {
          // Process previous section if it had matches
          if (sectionMatches || currentSectionHeader.toLowerCase().includes(term)) {
            html += `<div class="text-teal-400 font-semibold text-lg mt-8 mb-3">${highlight(currentSectionHeader)}</div>`;
            html += sectionBuffer.join('');
          }

          // Reset for new section
          currentSectionHeader = line;
          sectionMatches = false;
          sectionBuffer = [];
        } else if (line.trim()) {
          const isMatch = lower.includes(term);
          if (isMatch) sectionMatches = true;

          let displayLine = isMatch ? highlight(line) : line;
          const lineHtml = line.startsWith('- ')
            ? `<div class="fact bg-zinc-800 border-l-4 border-teal-500 pl-5 py-3 rounded-r-xl">${displayLine}</div>`
            : `<div class="text-zinc-400 text-sm pl-5">${displayLine}</div>`;

          sectionBuffer.push(lineHtml);
        }
      });

      // Catch the last section
      if (sectionMatches || currentSectionHeader.toLowerCase().includes(term)) {
        html += `<div class="text-teal-400 font-semibold text-lg mt-8 mb-3">${highlight(currentSectionHeader)}</div>`;
        html += sectionBuffer.join('');
      }

      document.getElementById('results').innerHTML = html || `<p class="text-orange-400 text-center py-10 text-lg italic">No results found for "<strong>${term}</strong>"</p>`;
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderContent(currentContent);
    }

    // Welcome message
    document.getElementById('status').innerHTML = '👆 Click the big teal button to auto-load MEMORY.md';
  </script>
</body>

</html>
